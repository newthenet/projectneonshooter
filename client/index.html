<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Project Neon – Test Lobby</title>
  <style>
    body { background:#0d1117; color:#c9d1d9; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
    .panel { background:#161b22; padding:24px; border-radius:12px; min-width:300px; text-align:center; }
    button { width:100%; margin:6px 0; padding:10px; border-radius:8px; border:1px solid #30363d; background:#21262d; color:#c9d1d9; cursor:pointer; }
    button:hover { background:#30363d; }
    input { width:100%; padding:10px; margin:6px 0; border-radius:8px; border:1px solid #30363d; background:#0d1117; color:#c9d1d9; }
    .hidden { display:none; }
    ul { list-style:none; padding:0; }
    li { padding:4px; background:#21262d; margin:4px 0; border-radius:4px; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Меню -->
    <div id="menu" class="panel">
      <h2>Project Neon</h2>
      <div id="auth">
        <input id="username" placeholder="Логин">
        <input id="password" type="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <button onclick="register()">Регистрация</button>
      </div>
      <div id="user" class="hidden">
        <p id="displayName"></p>
        <button onclick="showLobbies()">Играть</button>
        <button onclick="logout()">Выйти</button>
      </div>
    </div>
    <!-- Лобби -->
    <div id="lobbies" class="panel hidden">
      <h3>Лобби</h3>
      <div id="lobbyList">Загрузка...</div>
      <button onclick="createLobby()">Создать лобби</button>
      <div id="myLobby" class="hidden">
        <h4>Ваше лобби <span id="lobbyId"></span></h4>
        <ul id="players"></ul>
        <button onclick="startGame()">Начать игру</button>
      </div>
      <button onclick="leaveLobby()">Назад</button>
    </div>
  </div>

  <script>
    const SERVER = location.origin.replace(/^http/, 'ws');
    let token = localStorage.getItem('token');
    let user = null;
    let ws = null;
    let currentLobbyId = null;
    let inLobby = false;

    // UI элементы
    const menuDiv = document.getElementById('menu');
    const lobbiesDiv = document.getElementById('lobbies');
    const authDiv = document.getElementById('auth');
    const userDiv = document.getElementById('user');
    const displayName = document.getElementById('displayName');
    const lobbyList = document.getElementById('lobbyList');
    const myLobbyDiv = document.getElementById('myLobby');
    const lobbyIdSpan = document.getElementById('lobbyId');
    const playersUl = document.getElementById('players');

    function show(div) {
      menuDiv.classList.add('hidden');
      lobbiesDiv.classList.add('hidden');
      div.classList.remove('hidden');
    }

    function connectWS() {
      if (ws) { ws.onclose = null; ws.close(); }
      ws = new WebSocket(SERVER);
      ws.onopen = () => { if (token) ws.send(JSON.stringify({ type:'auth', token })); };
      ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch(ex) { return; }
        handleMessage(msg);
      };
      ws.onclose = () => setTimeout(connectWS, 3000);
    }

    function handleMessage(msg) {
      switch(msg.type) {
        case 'auth_ok':
          user = msg.user;
          showMenu();
          break;
        case 'lobby_list':
          if (!inLobby) renderLobbyList(msg.lobbies);
          break;
        case 'lobby_created':
          currentLobbyId = msg.lobbyId;
          inLobby = true;
          myLobbyDiv.classList.remove('hidden');
          lobbyIdSpan.textContent = currentLobbyId;
          break;
        case 'lobby_update':
          renderPlayers(msg.players);
          myLobbyDiv.classList.remove('hidden');
          // Показываем кнопку "Начать игру" только хосту
          if (msg.players[0]?.id === user.id) {
            document.querySelector('#myLobby button').style.display = 'block';
          } else {
            document.querySelector('#myLobby button').style.display = 'none';
          }
          break;
        case 'game_starting':
          alert('Игра начнётся через ' + msg.delay + ' секунд');
          break;
        case 'game_started':
          alert('Игра началась!');
          break;
        case 'error':
          alert(msg.text);
          break;
      }
    }

    function send(obj) {
      if (ws?.readyState === 1) ws.send(JSON.stringify(obj));
    }

    function login() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      fetch('/api/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username:u, password:p})
      }).then(r=>r.json()).then(d => {
        if(d.token) { token=d.token; localStorage.setItem('token',token); user=d.user; connectWS(); }
        else alert(d.error);
      });
    }

    function register() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      fetch('/api/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username:u, password:p})
      }).then(r=>r.json()).then(d => {
        if(d.token) { token=d.token; localStorage.setItem('token',token); user=d.user; connectWS(); }
        else alert(d.error);
      });
    }

    function showMenu() {
      authDiv.classList.add('hidden');
      userDiv.classList.remove('hidden');
      displayName.textContent = user.username + (user.is_neon ? ' ✔' : '');
      show(menuDiv);
    }

    function showLobbies() {
      show(lobbiesDiv);
      myLobbyDiv.classList.add('hidden');
      inLobby = false;
      send({ type:'lobby_list' });
    }

    function createLobby() {
      send({ type:'create_lobby' });
    }

    function leaveLobby() {
      if (inLobby) {
        send({ type:'leave_lobby' });
        inLobby = false;
        currentLobbyId = null;
      }
      show(menuDiv);
    }

    function renderLobbyList(list) {
      lobbyList.innerHTML = '';
      if (!list || list.length === 0) {
        lobbyList.innerHTML = '<p>Нет лобби</p>';
        return;
      }
      list.forEach(l => {
        const btn = document.createElement('button');
        btn.textContent = `${l.host} (${l.players}/10)`;
        btn.onclick = () => { send({ type:'join_lobby', lobbyId: l.id }); inLobby = true; };
        lobbyList.appendChild(btn);
      });
    }

    function renderPlayers(players) {
      playersUl.innerHTML = '';
      players.forEach(p => {
        const li = document.createElement('li');
        li.textContent = p.username;
        playersUl.appendChild(li);
      });
    }

    function startGame() {
      send({ type:'start_game' });
    }

    // Старт
    if (token) connectWS();
    else show(menuDiv);
  </script>
</body>
</html>
