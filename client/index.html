<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Project Neon</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; font-family:Arial,sans-serif; }
    .screen { display:none; position:absolute; top:0; left:0; width:100%; height:100%; }
    .screen.active { display:flex; justify-content:center; align-items:center; }
    .panel { background:rgba(0,0,0,0.85); color:#fff; padding:30px; border-radius:12px; text-align:center; min-width:300px; }
    h2 { margin-bottom:20px; color:#0ff; }
    button { display:block; width:100%; margin:8px 0; padding:12px; border:none; border-radius:6px; background:#0af; color:#fff; font-size:16px; cursor:pointer; }
    button:hover { background:#08f; }
    button.red { background:#c33; }
    input { display:block; width:100%; margin:8px 0; padding:10px; border:none; border-radius:4px; font-size:14px; }
    #lobbyList { margin:10px 0; max-height:200px; overflow-y:auto; }
    .hidden { display:none !important; }
    #chatBox { position:fixed; bottom:60px; left:10px; width:300px; color:#fff; font-size:14px; }
    #chatInput { position:fixed; bottom:10px; left:10px; width:300px; padding:8px; }
    #crosshair { position:fixed; top:50%; left:50%; width:20px; height:20px; transform:translate(-50%,-50%); pointer-events:none; }
  </style>
</head>
<body>

  <!-- МЕНЮ -->
  <div id="menuScreen" class="screen active">
    <div class="panel">
      <h2>Project Neon</h2>
      <div id="authBlock">
        <input id="loginUsername" placeholder="Логин">
        <input id="loginPassword" type="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <button onclick="register()">Регистрация</button>
      </div>
      <div id="userBlock" class="hidden">
        <p id="displayName"></p>
        <button onclick="showLobbies()">Играть</button>
        <button onclick="logout()" class="red">Выйти</button>
      </div>
    </div>
  </div>

  <!-- ЛОББИ -->
  <div id="lobbyScreen" class="screen">
    <div class="panel">
      <h3>Лобби</h3>
      <div id="lobbyList">Загрузка...</div>
      <button onclick="createLobby()">Создать лобби</button>
      <div id="inLobby" class="hidden">
        <h4>Игроки:</h4>
        <ul id="playerList"></ul>
        <button id="startBtn" onclick="startGame()">Начать</button>
      </div>
      <button onclick="leaveLobby()">Назад</button>
    </div>
  </div>

  <!-- ИГРА -->
  <div id="gameScreen" class="screen">
    <div id="crosshair" style="color:#0f0;font-size:24px;">+</div>
    <div id="chatBox"></div>
    <input id="chatInput" class="hidden" placeholder="Чат (Enter отправить)">
  </div>

  <script>
    const SERVER = location.origin.replace(/^http/, 'ws');
    let token = localStorage.getItem('token');
    let user = null;
    let ws = null;
    let lobbyId = null;
    let gameState = 'menu';

    // UI
    const menuScreen = document.getElementById('menuScreen');
    const lobbyScreen = document.getElementById('lobbyScreen');
    const gameScreen = document.getElementById('gameScreen');
    const authBlock = document.getElementById('authBlock');
    const userBlock = document.getElementById('userBlock');
    const displayName = document.getElementById('displayName');
    const lobbyList = document.getElementById('lobbyList');
    const inLobby = document.getElementById('inLobby');
    const playerList = document.getElementById('playerList');
    const startBtn = document.getElementById('startBtn');
    const chatBox = document.getElementById('chatBox');
    const chatInput = document.getElementById('chatInput');

    function showScreen(name) {
      menuScreen.classList.remove('active');
      lobbyScreen.classList.remove('active');
      gameScreen.classList.remove('active');
      document.getElementById(name + 'Screen').classList.add('active');
      gameState = name;
    }

    // WebSocket
    function connectWebSocket() {
      if (ws) ws.close();
      ws = new WebSocket(SERVER);
      ws.onopen = () => { if (token) ws.send(JSON.stringify({ type:'auth', token })); };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'auth_ok') { user = msg.user; showMenu(); }
        else if (msg.type === 'lobby_list') {
          lobbyList.innerHTML = '';
          msg.lobbies.forEach(l => {
            const b = document.createElement('button');
            b.textContent = l.host + ' (' + l.players + ')';
            b.onclick = () => ws.send(JSON.stringify({ type:'join_lobby', lobbyId:l.id }));
            lobbyList.appendChild(b);
          });
        }
        else if (msg.type === 'lobby_created') { lobbyId = msg.lobbyId; ws.send(JSON.stringify({ type:'lobby_list' })); }
        else if (msg.type === 'lobby_update') {
          playerList.innerHTML = '';
          msg.players.forEach(p => { const li = document.createElement('li'); li.textContent = p.username; playerList.appendChild(li); });
          inLobby.classList.remove('hidden');
          startBtn.style.display = (msg.players[0]?.id === user.id) ? 'block' : 'none';
        }
        else if (msg.type === 'game_start') { showScreen('game'); chatInput.classList.add('hidden'); }
        else if (msg.type === 'chat') { const d = document.createElement('div'); d.textContent = msg.from + ': ' + msg.text; chatBox.appendChild(d); }
        else if (msg.type === 'error') alert(msg.text);
      };
      ws.onclose = () => { if (gameState !== 'menu') showScreen('menu'); setTimeout(connectWebSocket, 3000); };
    }

    function send(msg) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg)); }

    // Auth
    function login() {
      const u = document.getElementById('loginUsername').value.trim();
      const p = document.getElementById('loginPassword').value;
      fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) })
        .then(r=>r.json()).then(d => { if(d.token) { token=d.token; localStorage.setItem('token',token); user=d.user; connectWebSocket(); } else alert(d.error); });
    }

    function register() {
      const u = document.getElementById('loginUsername').value.trim();
      const p = document.getElementById('loginPassword').value;
      fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p}) })
        .then(r=>r.json()).then(d => { if(d.token) { token=d.token; localStorage.setItem('token',token); user=d.user; connectWebSocket(); } else alert(d.error); });
    }

    function logout() { token = null; localStorage.removeItem('token'); user = null; ws.close(); showScreen('menu'); authBlock.classList.remove('hidden'); userBlock.classList.add('hidden'); }

    function showMenu() {
      showScreen('menu');
      authBlock.classList.add('hidden');
      userBlock.classList.remove('hidden');
      displayName.textContent = user.username + (user.is_neon ? ' ✔' : '');
    }

    function showLobbies() { showScreen('lobby'); inLobby.classList.add('hidden'); lobbyList.innerHTML = 'Загрузка...'; send({ type:'lobby_list' }); }
    function createLobby() { send({ type:'create_lobby' }); }
    function startGame() { send({ type:'start_game' }); }
    function leaveLobby() { send({ type:'leave_lobby' }); showScreen('menu'); }

    // Чат
    document.addEventListener('keydown', e => {
      if (e.code === 'Period' && gameState === 'game') { chatInput.classList.toggle('hidden'); if (!chatInput.classList.contains('hidden')) chatInput.focus(); }
    });
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { send({ type:'chat', text:chatInput.value }); chatInput.value = ''; chatInput.classList.add('hidden'); }
    });

    // Старт
    if (token) { connectWebSocket(); } else { showScreen('menu'); }
  </script>
</body>
</html>
