<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Project Neon</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DragControls.js"></script>
</head>
<body>
  <div id="app">
    <!-- МЕНЮ -->
    <div id="menuScreen" class="screen active">
      <div class="panel">
        <h2>Project Neon</h2>
        <div id="authBlock">
          <input id="loginUsername" placeholder="Логин"><br>
          <input id="loginPassword" type="password" placeholder="Пароль"><br>
          <button onclick="login()">Войти</button>
          <button onclick="register()">Регистрация</button>
        </div>
        <div id="userBlock" style="display:none;">
          <p id="displayName"></p>
          <button onclick="showLobbies()">Играть</button>
          <button id="editorBtn" style="display:none;" onclick="openEditor()">Редактор карт</button>
          <button onclick="showLeaderboard()">Лидерборд</button>
          <button onclick="logout()" class="red">Выйти</button>
        </div>
        <div id="leaderboardPanel" style="display:none;">
          <h3>Топ-50</h3>
          <div id="leaderboardList"></div>
          <button onclick="showMenu()">Назад</button>
        </div>
      </div>
    </div>
    <!-- ЛОББИ -->
    <div id="lobbyScreen" class="screen">
      <div class="panel">
        <h3>Лобби</h3>
        <div id="lobbyList">Загрузка...</div>
        <button onclick="createLobby()">Создать лобби</button>
        <div id="inLobby" style="display:none;">
          <h4>Лобби <span id="lobbyIdDisplay"></span></h4>
          <ul id="playerList" style="list-style:none;padding:0;"></ul>
          <div style="margin:8px 0;"><select id="mapSelect"><option value="">Стандартная</option></select></div>
          <button id="startBtn" onclick="startGame()">Начать игру</button>
        </div>
        <button onclick="leaveLobby()" class="red">Выход</button>
      </div>
    </div>
    <!-- ИГРА -->
    <div id="gameScreen" class="screen">
      <div id="gameCanvas"></div>
      <div id="crosshair"></div>
      <div id="clickOverlay">Кликните, чтобы начать игру</div>
      <div id="hud" style="display:none;">
        <span id="ammoDisplay">10/10</span>
        <div class="health-bar"><div id="healthFill" class="health-fill"></div></div>
        <span id="healthValue">100</span>
        <span id="roundInfo"></span>
      </div>
      <div id="chatBox"></div>
      <input id="chatInput" placeholder="Чат (. для открытия)">
    </div>
    <!-- РЕДАКТОР КАРТ -->
    <div id="editorScreen" class="screen">
      <div id="editorCanvas"></div>
      <div class="editor-panel">
        <button onclick="addObject('box')">Ящик</button>
        <button onclick="addObject('wall')">Стена</button>
        <button onclick="addSpawn('t')">Спавн Т</button>
        <button onclick="addSpawn('ct')">Спавн CT</button>
        <button onclick="addBombSite()">Плент</button>
        <div class="color-picker">
          <div class="color-btn" style="background:#8B7355;" onclick="setColor('#8B7355', this)"></div>
          <div class="color-btn" style="background:#888888;" onclick="setColor('#888888', this)"></div>
          <div class="color-btn" style="background:#ff4444;" onclick="setColor('#ff4444', this)"></div>
          <div class="color-btn" style="background:#4444ff;" onclick="setColor('#4444ff', this)"></div>
          <div class="color-btn" style="background:#44ff44;" onclick="setColor('#44ff44', this)"></div>
        </div>
        <input type="range" id="scaleSlider" min="0.5" max="3" step="0.1" value="1" oninput="scaleSelected(this.value)">
        <button onclick="deleteSelected()">Удалить выбранное</button>
        <button onclick="editorSaveMap()">Сохранить</button>
        <button onclick="editorLoadMap()">Загрузить</button>
        <button onclick="closeEditor()" class="red">Выход</button>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/network.js"></script>
  <script src="/js/game.js"></script>
  <script src="/js/editor.js"></script>
</body>
</html>
